<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="style.css" />
  <title>Water Billing Statement</title>
  
</head>
<body>

  <div class="billing-card">
    <h1>Water Billing Statement</h1>

    <form id="billingForm">
      <label for="customerName">Customer Name</label>
      <input type="text" id="customerName" placeholder="Enter full name">
      <p class="error" id="nameError">Customer name is required.</p>

      <label for="consumption">Water Consumption (Cubic Meter)</label>
      <input type="number" id="consumption" min="0">
      <p class="error" id="consumptionError">Enter a valid consumption value.</p>

      <label for="customerType">Customer Type</label>
      <select id="customerType">
        <option value="Regular">Regular</option>
        <option value="Senior Citizen">Senior Citizen</option>
        <option value="Solo Parent">Solo Parent</option>
      </select>

      <button type="submit">Generate Bill</button><br><br>
      <button type="reset">Reset</button>
    </form>
    <p class="counter" id="counterDisplay">Transactions Processed : 0</p>
    <div id="billOutput"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
